name: safteywatch
description: "SafetyWatch - Workplace Safety Monitoring App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.2.0
  freezed_annotation: ^3.1.0
  json_annotation: any
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: any
  freezed: any
  json_serializable: any

flutter:
  uses-material-design: true
  assets:
    - assets/images/
