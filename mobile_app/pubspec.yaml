name: safteywatch
description: "SafetyWatch - Workplace Safety Monitoring App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.2.0
  share_plus: ^10.1.4
  shared_preferences: ^2.5.3
  freezed_annotation: ^3.1.0
  json_annotation: any
  dartz: ^0.10.1
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  flutter_displaymode: ^0.7.0
  google_fonts: ^8.1.0
  intl: ^0.20.2
  image_picker: ^1.2.2
  file_picker: ^11.0.2
  video_player: ^2.11.1
  webview_flutter: ^4.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: any
  freezed: any
  json_serializable: any
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_v3.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_v3.png"
