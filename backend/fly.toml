# fly.toml app configuration file generated for safetywatch-api on 2026-06-08T13:23:40+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'safetywatch-api'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_DEBUG = 'false'
  APP_ENV = 'production'
  DB_CONNECTION = 'sqlite'
  DB_DATABASE = '/mnt/sqlite/database.sqlite'
  FILESYSTEM_DISK = 's3'
  LOG_CHANNEL = 'stderr'

[[mounts]]
  source = 'sqlite_data'
  destination = '/mnt/sqlite'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
